---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: doublecommander
  namespace: doublecommander
spec:
  interval: 15m
  chart:
    spec:
      chart: doublecommander
      version: 14.5.8
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    global:
      stopAll: false    
    TZ: Europe/Brussels
    credentials:
      s3:
        type: s3
        url: "${S3URL_minio}"
        bucket: "${S3PREFIX_minio}-doublecommander"
        accessKey: "${S3ID_minio}"
        secretKey: "${S3KEY_minio}"
        encrKey: "${S3KEY_minio}" 
    persistence:
      config:
        volsync:
          - name: b2
            type: restic
            credentials: s3
            dest:
              enabled: true                          
            src:
              enabled: true     
      homeds:
        enabled: true
        path: /mnt/main/HomeDS2
        mountPath: /homeds
        server: 192.168.1.49
        type: nfs
      media:
        enabled: true
        path: /mnt/main/Media2
        mountPath: /media
        server: 192.168.1.49
        type: nfs
      pictures:
        enabled: true
        path: /mnt/main/Pics2
        mountPath: /pictures
        server: 192.168.1.49
        type: nfs
      vmstore:
        enabled: true
        path: /mnt/apps/vm_store
        mountPath: /vmstore
        server: 192.168.1.49
        type: nfs         
    ingress:
      main:
        enabled: true
        integrations:
          traefik:
            enabled: true
            middlewares:
              #- name: bouncer 
              #  namespace: traefik
              - name: local
                namespace: traefik
              - name: auth               
        hosts:
          - host: tc.${BASE_DOMAIN}
        tls:
          - hosts:
              - tc.${BASE_DOMAIN}
            clusterIssuer: cluster-cert              