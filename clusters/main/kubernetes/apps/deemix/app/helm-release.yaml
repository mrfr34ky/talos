apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: deemix
  namespace: deemix
spec:
  interval: 15m
  chart:
    spec:
      chart: deemix
      version: 12.2.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  releaseName: deemix
  values:
    persistence:
      config:
          enabled: true
          mountPath: /config
          readOnly: false
      downloads:
        enabled: true
        mountPath: /downloads
        path: /mnt/main/Music/Balazs        
        server: 192.168.1.49
        type: nfs
    ingress:
      main:
        enabled: true
        integrations:
          traefik:
            enabled: true
          certManager:
            enabled: true
            certificateIssuer: cert
        hosts:
          - host: balazs.deemix6.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - balazs.deemix6.${BASE_DOMAIN}
            clusterIssuer: cluster-cert        
