---
# yaml-language-server: $schema=https://kubernetes-schemas.zinn.ca/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent 
  namespace: qbittorrent
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              version: v1
              kind: Deployment
              name: qbittorrent
            patch: |
              - op: add
                path: /spec/template/spec/containers/1/resources/limits/squat.ai~1tun
                value: 1
  interval: 15m
  chart:
    spec:
      chart: qbittorrent
      version: 22.1.5
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    TZ: Europe/Brussels
    credentials:
      s3:
        type: s3
        url: "${S3URL}"
        bucket: "${S3PREFIX}-metube"
        accessKey: "${S3ID}"
        secretKey: "${S3KEY}"
        encrKey: "${S3KEY}"            
    service:
      torrent:
        loadBalancerIP: ${TRAEFIK_IP}
      #gluetun:
      #  enabled: true
      #  name: gluetun
      #  ports:
      #    gluetun:
      #      enabled: true
      #      name: gluetun
      #      port: 8000
      #      protocol: http
      #      targetPort: 8000
      #  type: ClusterIP    
      proxy:
        enabled: true        
        ports:
          gluetun:
            enabled: true            
            port: 8888
            protocol: http
            targetPort: 8888
        type: ClusterIP         
    ingress:
      main:
        enabled: true
        integrations:
          traefik:
            enabled: true
          certManager:
            enabled: true
            certificateIssuer: cert
        hosts:
          - host: qbit6.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - qbit6.${BASE_DOMAIN}
            clusterIssuer: cluster-cert      
    persistence:
      config:
        volsync:
          - name: b2
            type: restic
            credentials: s3
            dest:
              enabled: true                          
              cacheCapacity: 10Gi
            src:
              enabled: true
              cacheCapacity: 10Gi
#      backup:
#        enabled: true
#        mountPath: /backup
#        volsync:
#          - name: b2
#            type: restic
#           credentials: s3
#            dest:
#              cacheCapacity: 10Gi
#              enabled: true
#            src:
#              enabled: true
#              cacheCapacity: 10Gi  
      downloads:
        enabled: true
        path: /mnt/main/Videos/downloads
        mountPath: /downloads
        server: 192.168.1.49
        type: nfs
    addons:
      vpn:
        type: gluetun
        killswitch: true
        excludeNetworks_IPv4:
          - "192.168.1.0/24"
        excludedNetworks_IPv6: []  
        env:
          HTTPPROXY: "on"
          HTTPPROXY_LOG: "on"
          HTTPPROXY_LISTENING_ADDRESS: :8888
          DNS_KEEP_NAMESERVER: "off"
          DNS_ADDRESS: "103.86.96.100"
          VPN_SERVICE_PROVIDER: "nordvpn"
          VPN_TYPE: "openvpn"
          OPENVPN_USER: ${OPENVPN_USER}
          OPENVPN_PASSWORD: ${OPENVPN_PASSWORD}
          SERVER_COUNTRIES: "Belgium"
          FIREWALL_INPUT_PORTS: 10095,8888