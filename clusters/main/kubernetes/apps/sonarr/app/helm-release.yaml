---
# yaml-language-server: $schema=https://kubernetes-schemas.zinn.ca/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
  namespace: sonarr
spec:
  interval: 15m
  chart:
    spec:
      chart: sonarr
      version: 23.2.2
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    TZ: Europe/Brussels
    credentials:
      s3:
        type: s3
        url: "${S3URL}"
        bucket: "${S3PREFIX}-sonarr"
        accessKey: "${S3ID}"
        secretKey: "${S3KEY}"
        encrKey: "${S3KEY}"          
    persistence:
      config:
        volsync:
          - name: b2
            type: restic
            credentials: s3
            dest:
              enabled: true                          
              cacheCapacity: 10Gi
            src:
              enabled: true
              cacheCapacity: 10Gi
#      backup:
#        enabled: true
#        mountPath: /backup
#        volsync:
#          - name: b2
#            type: restic
#            credentials: s3
#            dest:
#              cacheCapacity: 10Gi
#              enabled: true
#            src:
#              enabled: true
#              cacheCapacity: 10Gi         
      films:
        enabled: true
        path: /mnt/main/Videos/Series
        mountPath: /Video/Series
        server: 192.168.1.49
        type: nfs        
    workload:
      exportarr:
        enabled: false
    metrics:
      main:
        enabled: false        
    ingress:
      main:
        enabled: true
        integrations:
          traefik:
            enabled: true
          certManager:
            enabled: true
            certificateIssuer: cert
        hosts:
          - host: sonarr6.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - sonarr6.${BASE_DOMAIN}
            clusterIssuer: cluster-cert        