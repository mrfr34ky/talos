---
# yaml-language-server: $schema=https://kubernetes-schemas.zinn.ca/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: deemix2
  namespace: deemix2
spec:
  interval: 15m
  chart:
    spec:
      chart: deemix
      version: 12.2.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    TZ: Europe/Brussels
    persistence:
      config:
          enabled: true
          mountPath: /config
          readOnly: false
      downloads:
        enabled: true
        mountPath: /downloads
        path: /mnt/main/Music/Christine        
        server: 192.168.1.49
        type: nfs
    ingress:
      main:
        enabled: true
        integrations:
          traefik:
            enabled: true
          certManager:
            enabled: true
            certificateIssuer: cert
        hosts:
          - host: christine.deemix6.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - christine.deemix6.${BASE_DOMAIN}
            clusterIssuer: cluster-cert        
