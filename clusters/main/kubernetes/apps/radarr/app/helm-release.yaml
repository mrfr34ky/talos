---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
  namespace: radarr
spec:
  interval: 15m
  chart:
    spec:
      chart: radarr
      version: 23.19.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    global:
      stopAll: false
    TZ: Europe/Brussels
    credentials:
      s3:
        type: s3
        url: "${S3URL_minio}"
        bucket: "${S3PREFIX_minio}-radarr"
        accessKey: "${S3ID_minio}"
        secretKey: "${S3KEY_minio}"
        encrKey: "${S3KEY_minio}"        
    persistence:
      config:
        volsync:
          - name: b2
            type: restic
            credentials: s3
            dest:
              enabled: true                          
            src:
              enabled: true          
      films:
        enabled: true
        path: /mnt/main/Media2/Films
        mountPath: /Videos/Films
        server: 192.168.1.49
        type: nfs  
      bin:
        enabled: true
        path: /mnt/main/Media2/Recyclebin
        mountPath: /Recyclebin
        server: 192.168.1.49
        type: nfs
      radarrcompleted:
        enabled: true
        path: /mnt/main/Media2/downloads/completed
        mountPath: /media/downloads/completed
        server: 192.168.1.49
        type: nfs      
    ingress:
      main:
        enabled: true
        integrations:
          traefik:
            enabled: true
            middlewares:
              #- name: bouncer 
              #  namespace: traefik
              - name: local
                namespace: traefik
              - name: auth
        hosts:
          - host: radarr.${BASE_DOMAIN}
        tls:
          - hosts:
              - radarr.${BASE_DOMAIN}
            clusterIssuer: cluster-cert         